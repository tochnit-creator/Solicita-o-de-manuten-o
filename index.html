<style>
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --bg:#f3f1ea; --surface:#ffffff; --ink:#211f1b; --muted:#6f6b64; --faint:#9c968c;
  --line:#e7e2d6; --line-2:#f1ede3; --brand:#d9480f; --brand-2:#bb3d0b;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(30,25,18,.05),0 2px 8px rgba(30,25,18,.045);
  --shadow-lg:0 8px 28px rgba(30,25,18,.11);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;}
.mono{font-family:'JetBrains Mono',monospace;}

.topbar{height:4px;background:var(--brand);}
.nav{background:var(--surface);border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(30,25,18,.04);position:sticky;top:0;z-index:20;}
.nav-in{max-width:1000px;margin:0 auto;padding:0 24px;}
.brand{display:flex;align-items:center;gap:13px;padding:18px 0 14px;}
.brand-logo{width:44px;height:44px;background:var(--brand);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 2px 7px rgba(217,72,15,.32);}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:2.5px;color:var(--brand);font-weight:700;}
.wordmark{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.1;margin:1px 0 0;}
.tabs{display:flex;gap:2px;}
.tab{appearance:none;background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);padding:12px 14px;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:7px;transition:color .15s,border-color .15s;margin-bottom:-1px;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--ink);border-color:var(--brand);}

.container{max-width:1000px;margin:0 auto;padding:34px 24px 56px;}
.narrow{max-width:600px;margin:0 auto;}
.page-head{margin-bottom:22px;}
.page-title{font-size:23px;font-weight:800;letter-spacing:-.4px;margin:0 0 6px;}
.page-sub{color:var(--muted);font-size:14.5px;margin:0;max-width:600px;line-height:1.5;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.card.lift{transition:box-shadow .2s,transform .2s;}
.card.lift:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}

.btn{appearance:none;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid transparent;border-radius:var(--radius-sm);transition:background .15s,box-shadow .15s,transform .1s,border-color .15s,filter .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.5;cursor:default;}
.btn-primary{background:var(--brand);color:#fff;padding:13px 18px;font-size:14.5px;}
.btn-primary:hover:not(:disabled){background:var(--brand-2);}
.btn-dark{background:var(--ink);color:#fff;padding:10px 16px;font-size:13.5px;}
.btn-dark:hover:not(:disabled){filter:brightness(1.25);}
.btn-ghost{background:var(--surface);color:#44413c;border-color:var(--line);padding:9px 14px;font-size:13.5px;}
.btn-ghost:hover:not(:disabled){border-color:#d4cdbe;background:#fbfaf6;}
.btn-danger{background:#dc2626;color:#fff;padding:7px 13px;font-size:13px;}
.btn-danger:hover{background:#b91c1c;}
.statusbtn:hover{filter:brightness(1.05);}
.iconbtn{background:none;border:none;cursor:pointer;display:inline-flex;padding:4px;border-radius:6px;transition:background .15s;}
.iconbtn:hover{background:#f3efe6;}
.link{background:none;border:none;cursor:pointer;font-family:inherit;}
.link:hover{text-decoration:underline;}

.field{margin-bottom:17px;}
.label{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:7px;text-transform:uppercase;}
.input,.textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:#fcfbf8;border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 13px;outline:none;transition:border-color .15s,box-shadow .15s,background .15s;}
.input:focus,.textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(217,72,15,.13);background:#fff;}
.input::placeholder,.textarea::placeholder{color:var(--faint);}

.chip{cursor:pointer;font-family:inherit;background:var(--surface);color:#54514b;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;}
.chip:hover{border-color:#d4cdbe;}
.hr{height:1px;background:var(--line-2);border:none;}

.footer{border-top:1px solid var(--line);margin-top:44px;background:var(--surface);}
.footer-in{max-width:1000px;margin:0 auto;padding:20px 24px;color:var(--faint);font-size:12.5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}

.spin{animation:sp 1s linear infinite;}@keyframes sp{to{transform:rotate(360deg);}}
.rise{animation:rise .42s cubic-bezier(.2,.8,.2,1) backwards;}@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.pop{animation:pop .2s ease;}@keyframes pop{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:none;}}

.wa-fab{position:fixed;right:22px;bottom:22px;z-index:60;display:flex;align-items:center;gap:9px;background:#25D366;color:#fff;text-decoration:none;padding:13px 18px;border-radius:999px;font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:14px;box-shadow:0 6px 20px rgba(37,211,102,.45);transition:transform .15s,box-shadow .15s;}
.wa-fab:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(37,211,102,.55);}
.wa-fab svg{flex-shrink:0;}

@media(max-width:560px){
  .brand{padding:15px 0 11px;gap:11px;}.brand-logo{width:40px;height:40px;}
  .wordmark{font-size:19px;}.tab{padding:11px 9px;font-size:13px;gap:5px;}
  .container{padding:24px 16px 44px;}.nav-in,.footer-in{padding-left:16px;padding-right:16px;}
  .wa-fab{right:16px;bottom:16px;padding:14px;}.wa-label{display:none;}
}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ---------------- Config / banco ---------------- */
const CONFIGURED = !String(window.SUPABASE_URL).includes("COLE_AQUI") &&
                   !String(window.SUPABASE_KEY).includes("COLE_AQUI");
const db = CONFIGURED ? supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY) : null;
const TABLE = "solicitacoes";
const CODIGO = window.CODIGO_GESTAO || "7321";

const STATUSES = [
  { key:"recebido",   label:"Recebido",            color:"#737373" },
  { key:"analise",    label:"Em análise",          color:"#2563eb" },
  { key:"aceite",     label:"Aceite",              color:"#0891b2" },
  { key:"andamento",  label:"Em andamento",        color:"#d9480f" },
  { key:"diretoria",  label:"Aprovação diretoria", color:"#7c3aed" },
  { key:"finalizado", label:"Finalizado",          color:"#15803d" },
];
const sInfo = (k) => STATUSES.find(s=>s.key===k) || STATUSES[0];
const sIdx  = (k) => STATUSES.findIndex(s=>s.key===k);

const PRIORIDADES = [
  { key:"baixa",   label:"Baixa",   color:"#64748b" },
  { key:"media",   label:"Média",   color:"#2563eb" },
  { key:"alta",    label:"Alta",    color:"#d97706" },
  { key:"urgente", label:"Urgente", color:"#dc2626" },
];
const pInfo = (k)=> PRIORIDADES.find(p=>p.key===k) || PRIORIDADES[1];
const CATEGORIAS = ["Elétrica","Hidráulica","Climatização","Mobiliário","TI / Equipamentos","Estrutura / Alvenaria","Limpeza","Outros"];

/* ---------------- Notificações por e-mail (opcional, via EmailJS) ---------------- */
const EMAIL_ON = !!(window.EMAILJS_PUBLIC_KEY && window.EMAILJS_SERVICE_ID && window.emailjs);
if(EMAIL_ON){ try{ emailjs.init({publicKey: window.EMAILJS_PUBLIC_KEY}); }catch(e){ console.error(e); } }
async function notifyNova(o){
  if(!EMAIL_ON || !window.EMAILJS_TEMPLATE_NOVA || !window.EMAIL_GESTOR) return;
  try{ await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_NOVA, {
    to_email: window.EMAIL_GESTOR, protocolo:o.protocolo, nome:o.nome, setor:o.setor,
    categoria:o.categoria||"-", prioridade:pInfo(o.prioridade).label, descricao:o.descricao, contato:o.contato||"-" });
  }catch(e){ console.error("EmailJS (nova):",e); }
}
async function notifyStatus(o, statusKey){
  if(!EMAIL_ON || !window.EMAILJS_TEMPLATE_STATUS) return;
  if(!o.contato || !o.contato.includes("@")) return;
  try{ await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_STATUS, {
    to_email:o.contato, protocolo:o.protocolo, nome:o.nome, status:sInfo(statusKey).label });
  }catch(e){ console.error("EmailJS (status):",e); }
}

/* ---------------- Operações de banco ---------------- */
function fromRow(r){
  return { id:r.id, protocolo:r.protocolo, nome:r.nome, setor:r.setor, descricao:r.descricao,
    status:r.status, prazo:r.prazo||"", createdAt:Number(r.created_at), updatedAt:Number(r.updated_at),
    historico: Array.isArray(r.historico) ? r.historico : [],
    prioridade:r.prioridade||"media", categoria:r.categoria||"", contato:r.contato||"", arquivado:!!r.arquivado };
}
async function dbList(){
  const { data, error } = await db.from(TABLE).select("*").order("created_at",{ascending:false});
  if(error) throw error; return (data||[]).map(fromRow);
}
async function dbInsert(o){
  const { error } = await db.from(TABLE).insert({ id:o.id, protocolo:o.protocolo, nome:o.nome, setor:o.setor,
    descricao:o.descricao, status:o.status, prazo:o.prazo, created_at:o.createdAt, updated_at:o.updatedAt, historico:o.historico,
    prioridade:o.prioridade, categoria:o.categoria, contato:o.contato, arquivado:false });
  if(error) throw error;
}
async function dbUpdate(id, patch){
  const row = {};
  if("status" in patch) row.status = patch.status;
  if("prazo" in patch) row.prazo = patch.prazo;
  if("descricao" in patch) row.descricao = patch.descricao;
  if("historico" in patch) row.historico = patch.historico;
  if("updatedAt" in patch) row.updated_at = patch.updatedAt;
  if("prioridade" in patch) row.prioridade = patch.prioridade;
  if("categoria" in patch) row.categoria = patch.categoria;
  if("contato" in patch) row.contato = patch.contato;
  if("arquivado" in patch) row.arquivado = patch.arquivado;
  const { error } = await db.from(TABLE).update(row).eq("id", id);
  if(error) throw error;
}
async function dbDelete(id){ const { error } = await db.from(TABLE).delete().eq("id", id); if(error) throw error; }
async function dbFindByProtocolo(p){
  const { data, error } = await db.from(TABLE).select("*").eq("protocolo", p).limit(1);
  if(error) throw error; return (data && data[0]) ? fromRow(data[0]) : null;
}

/* ---------------- Ícones ---------------- */
const PATHS = {
  wrench:<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>,
  user:<React.Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
  building:<React.Fragment><rect x="6" y="3" width="12" height="18" rx="1"/><line x1="9" y1="7" x2="9" y2="7"/><line x1="15" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="9" y2="11"/><line x1="15" y1="11" x2="15" y2="11"/><line x1="10" y1="21" x2="14" y2="21"/></React.Fragment>,
  file:<React.Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></React.Fragment>,
  calendar:<React.Fragment><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></React.Fragment>,
  lock:<React.Fragment><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></React.Fragment>,
  unlock:<React.Fragment><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></React.Fragment>,
  checkc:<React.Fragment><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></React.Fragment>,
  trash:<React.Fragment><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></React.Fragment>,
  search:<React.Fragment><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></React.Fragment>,
  plus:<React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>,
  arrow:<React.Fragment><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></React.Fragment>,
  x:<React.Fragment><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></React.Fragment>,
  clock:<React.Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></React.Fragment>,
  hash:<React.Fragment><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></React.Fragment>,
  chevron:<polyline points="9 18 15 12 9 6"/>,
  clip:<React.Fragment><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="16" x2="13" y2="16"/></React.Fragment>,
  alert:<React.Fragment><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></React.Fragment>,
  refresh:<React.Fragment><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></React.Fragment>,
  archive:<React.Fragment><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></React.Fragment>,
};
function Icon({name, size=16, color, sw=2, style, className}){
  return <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color||"currentColor"} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{PATHS[name]}</svg>;
}

/* ---------------- Auxiliares ---------------- */
function PriorityBadge({prioridade,small}){
  const p = pInfo(prioridade);
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,background:p.color+"14",color:p.color,
    border:`1px solid ${p.color}33`,borderRadius:999,padding:small?"3px 8px":"4px 10px",
    fontSize:small?10.5:11.5,fontWeight:700,whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:.3}}>
    <span style={{width:6,height:6,borderRadius:999,background:p.color}}/>{p.label}</span>;
}
function StatusBadge({status,small}){
  const s = sInfo(status);
  return <span style={{display:"inline-flex",alignItems:"center",gap:6,background:s.color+"14",color:s.color,
    border:`1px solid ${s.color}33`,borderRadius:999,padding:small?"3px 9px":"5px 11px",
    fontSize:small?11:12,fontWeight:600,whiteSpace:"nowrap"}}>
    <span style={{width:7,height:7,borderRadius:999,background:s.color}}/>{s.label}</span>;
}
function Stepper({status}){
  const idx = sIdx(status);
  return <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
    {STATUSES.map((s,i)=>{ const done=i<=idx; return (
      <div key={s.key} style={{display:"flex",alignItems:"center",gap:4}}>
        <div title={s.label} style={{width:22,height:22,borderRadius:999,display:"flex",alignItems:"center",
          justifyContent:"center",background:done?s.color:"#e9e3d6",color:done?"#fff":"#a8a297",
          fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{i+1}</div>
        {i<STATUSES.length-1 && <div style={{width:14,height:2,borderRadius:2,
          background:i<idx?sInfo(STATUSES[i+1].key).color:"#e9e3d6"}}/>}
      </div>);})}
  </div>;
}

/* ---------------- App ---------------- */
function App(){
  const [tab,setTab] = useState("nova");
  const [requests,setRequests] = useState([]);
  const [loading,setLoading] = useState(true);
  const [error,setError] = useState("");

  const reload = useCallback(async ()=>{
    if(!CONFIGURED){ setLoading(false); return; }
    try{ const list = await dbList(); setRequests(list); setError(""); }
    catch(e){ setError("Falha ao carregar dados. Verifique a configuração do Supabase."); console.error(e); }
    finally{ setLoading(false); }
  },[]);
  useEffect(()=>{ reload(); },[reload]);

  if(!CONFIGURED) return <SetupScreen/>;

  const tabs=[{k:"nova",label:"Nova solicitação",ic:"plus"},{k:"acompanhar",label:"Acompanhar",ic:"search"},{k:"gestao",label:"Painel de gestão",ic:"clip"}];

  return (
    <div>
      <div className="topbar"/>
      <nav className="nav"><div className="nav-in">
        <div className="brand">
          <div className="brand-logo"><Icon name="wrench" size={23} sw={2.3}/></div>
          <div><div className="eyebrow">ORDENS DE SERVIÇO</div><h1 className="wordmark">Solicitação de Manutenção</h1></div>
        </div>
        <div className="tabs">{tabs.map(t=>(
          <button key={t.k} className={"tab"+(tab===t.k?" active":"")} onClick={()=>setTab(t.k)}><Icon name={t.ic} size={16}/>{t.label}</button>
        ))}</div>
      </div></nav>

      <div className="container">
        {error && <div className="rise" style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#991b1b",borderRadius:10,padding:"12px 14px",marginBottom:20,fontSize:13.5}}>{error}</div>}
        {tab==="nova" ? <NovaSolicitacao onCreated={reload}/>
          : tab==="acompanhar" ? <Acompanhar/>
          : <Gestao requests={requests} loading={loading} reload={reload}/>}
      </div>

      <footer className="footer"><div className="footer-in">
        <span>Sistema de Solicitação de Manutenção</span>
        <span className="mono">© {new Date().getFullYear()}</span>
      </div></footer>
      <WhatsAppButton/>
    </div>
  );
}

/* ---------------- Botão flutuante de WhatsApp ---------------- */
function WhatsAppButton(){
  const tel = "5511978477887"; // (11) 97847-7887 com código do país (55)
  const msg = encodeURIComponent("Prezados, gostaria de esclarecer uma dúvida referente ao Sistema de Solicitação de Manutenção. Poderiam me auxiliar, por favor? Desde já, agradeço.");
  const href = `https://wa.me/${tel}?text=${msg}`;
  return (

/* ---------------- Nova solicitação ---------------- */
function NovaSolicitacao({onCreated}){
  const [nome,setNome]=useState(""); const [setor,setSetor]=useState("");
  const [descricao,setDescricao]=useState(""); const [sending,setSending]=useState(false);
  const [done,setDone]=useState(null); const [erro,setErro]=useState("");
  const [prioridade,setPrioridade]=useState("media");
  const [categoria,setCategoria]=useState(""); const [contato,setContato]=useState("");

  const submit = async ()=>{
    if(!nome.trim()||!setor.trim()||!descricao.trim()||!categoria) return;
    setSending(true); setErro("");
    const id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    const protocolo = "OS-"+id.slice(-5).toUpperCase();
    const now = Date.now();
    const obj = { id, protocolo, nome:nome.trim(), setor:setor.trim(), descricao:descricao.trim(),
      status:"recebido", prazo:"", createdAt:now, updatedAt:now, historico:[{status:"recebido",at:now}],
      prioridade, categoria, contato:contato.trim() };
    try{
      await dbInsert(obj); notifyNova(obj);
      setDone(protocolo); setNome(""); setSetor(""); setDescricao(""); setPrioridade("media"); setCategoria(""); setContato(""); onCreated();
    }catch(e){ console.error(e); setErro("Não foi possível enviar. Tente novamente."); }
    finally{ setSending(false); }
  };

  if(done) return (
    <div className="narrow">
      <div className="card rise" style={{padding:38,textAlign:"center"}}>
        <div style={{width:58,height:58,borderRadius:999,background:"#15803d15",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Icon name="checkc" size={32} color="#15803d"/></div>
        <h2 className="page-title" style={{margin:"0 0 6px"}}>Solicitação registrada</h2>
        <p className="page-sub" style={{margin:"0 auto 18px"}}>Guarde o número de protocolo abaixo — é com ele que você acompanha o andamento na aba "Acompanhar".</p>
        <div className="mono" style={{display:"inline-block",background:"#f8f6f0",border:"1px solid var(--line)",borderRadius:8,padding:"12px 24px",fontSize:23,fontWeight:700,letterSpacing:1.5}}>{done}</div>
        <div><button className="btn btn-dark" onClick={()=>setDone(null)} style={{marginTop:22}}>Enviar outra solicitação</button></div>
      </div>
    </div>
  );

  const incompleto = !nome.trim()||!setor.trim()||!descricao.trim()||!categoria;
  return (
    <div className="narrow">
      <div className="page-head">
        <h2 className="page-title">Abrir nova solicitação</h2>
        <p className="page-sub">Preencha os dados abaixo. Ao enviar, você receberá um número de protocolo para acompanhar o andamento.</p>
      </div>
      <div className="card rise" style={{padding:26}}>
        <div className="field"><label className="label"><Icon name="user" size={13}/> Nome do solicitante</label>
          <input className="input" value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex.: Maria Souza"/></div>
        <div className="field"><label className="label"><Icon name="building" size={13}/> Setor</label>
          <input className="input" value={setor} onChange={e=>setSetor(e.target.value)} placeholder="Ex.: Recepção / 2º andar"/></div>
        <div className="field"><label className="label"><Icon name="file" size={13}/> E-mail para contato <span style={{textTransform:"none",letterSpacing:0,fontWeight:500,color:"var(--faint)"}}>(opcional)</span></label>
          <input className="input" type="email" value={contato} onChange={e=>setContato(e.target.value)} placeholder="voce@empresa.com — para avisarmos quando o status mudar"/></div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          <div className="field" style={{flex:"1 1 200px"}}><label className="label"><Icon name="clip" size={13}/> Categoria</label>
            <select className="input" value={categoria} onChange={e=>setCategoria(e.target.value)}>
              <option value="" disabled>Selecione...</option>
              {CATEGORIAS.map(c=><option key={c} value={c}>{c}</option>)}
            </select></div>
          <div className="field" style={{flex:"1 1 200px"}}><label className="label"><Icon name="alert" size={13}/> Prioridade</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {PRIORIDADES.map(p=>{ const active=prioridade===p.key; return (
                <button key={p.key} type="button" className="btn statusbtn" onClick={()=>setPrioridade(p.key)}
                  style={{background:active?p.color:p.color+"12",color:active?"#fff":p.color,border:`1px solid ${p.color}${active?"":"33"}`,borderRadius:8,padding:"8px 12px",fontSize:12.5,fontWeight:600}}>{p.label}</button>);})}
            </div></div>
        </div>
        <div className="field" style={{marginBottom:22}}><label className="label"><Icon name="file" size={13}/> Descrição do problema</label>
          <textarea className="textarea" rows={4} value={descricao} onChange={e=>setDescricao(e.target.value)} placeholder="Descreva o que precisa de manutenção, local exato, urgência, etc." style={{resize:"vertical"}}/></div>
        {erro && <div style={{color:"#dc2626",fontSize:13,marginBottom:12}}>{erro}</div>}
        <button className="btn btn-primary" onClick={submit} disabled={sending||incompleto} style={{width:"100%"}}>
          {sending ? "Enviando..." : <React.Fragment>Enviar solicitação <Icon name="arrow" size={17}/></React.Fragment>}
        </button>
      </div>
    </div>
  );
}

/* ---------------- Acompanhar ---------------- */
function Acompanhar(){
  const [proto,setProto]=useState(""); const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(undefined); const [erro,setErro]=useState("");

  const buscar = async ()=>{
    const p = proto.trim().toUpperCase(); if(!p) return;
    setBusy(true); setErro(""); setRes(undefined);
    try{ const r = await dbFindByProtocolo(p); setRes(r); }
    catch(e){ console.error(e); setErro("Não foi possível consultar agora. Tente novamente."); }
    finally{ setBusy(false); }
  };
  const fmt=(ts)=>new Date(ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
  const fmtFull=(ts)=>new Date(ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});

  let prazoInfo=null;
  if(res && res.prazo){
    const today=new Date(); today.setHours(0,0,0,0);
    const d=new Date(res.prazo+"T00:00:00"); const diff=Math.round((d-today)/86400000);
    if(res.status==="finalizado") prazoInfo={txt:"Concluído",color:"#15803d"};
    else if(diff<0) prazoInfo={txt:`Atrasado ${Math.abs(diff)}d`,color:"#dc2626"};
    else if(diff===0) prazoInfo={txt:"Vence hoje",color:"#d9480f"};
    else prazoInfo={txt:`Faltam ${diff}d`,color:"var(--muted)"};
  }

  return (
    <div className="narrow">
      <div className="page-head">
        <h2 className="page-title">Acompanhar solicitação</h2>
        <p className="page-sub">Digite o número de protocolo que você recebeu ao enviar a solicitação para ver o status atual.</p>
      </div>
      <div className="card rise" style={{padding:24}}>
        <div style={{display:"flex",gap:8}}>
          <input className="input mono" value={proto} onChange={e=>setProto(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&buscar()} placeholder="OS-XXXXX" style={{textTransform:"uppercase",letterSpacing:1}}/>
          <button className="btn btn-primary" onClick={buscar} disabled={busy||!proto.trim()} style={{padding:"0 18px",whiteSpace:"nowrap"}}>
            <Icon name="search" size={16}/> {busy?"...":"Buscar"}</button>
        </div>
        {erro && <div style={{color:"#dc2626",fontSize:13,marginTop:10}}>{erro}</div>}
        {res===null && <div style={{marginTop:14,background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"12px 14px",fontSize:13.5,color:"#9a3412",display:"flex",alignItems:"center",gap:8}}>
          <Icon name="alert" size={16}/> Nenhuma solicitação encontrada com esse protocolo. Confira o número e tente de novo.</div>}
      </div>

      {res && (()=>{ const s=sInfo(res.status); return (
        <div className="card rise" style={{borderLeft:`4px solid ${s.color}`,padding:20,marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <div className="mono" style={{fontSize:11,fontWeight:700,color:s.color,display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                <Icon name="hash" size={12}/>{res.protocolo}<span style={{color:"var(--faint)",fontWeight:500}}>· aberto em {fmt(res.createdAt)}</span></div>
              <div style={{fontSize:17,fontWeight:700,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <Icon name="user" size={15} color="var(--muted)"/>{res.nome}
                <span style={{fontSize:13,fontWeight:500,color:"var(--muted)",display:"inline-flex",alignItems:"center",gap:4}}><Icon name="building" size={13}/>{res.setor}</span></div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <StatusBadge status={res.status}/>
              <PriorityBadge prioridade={res.prioridade} small/>
            </div>
          </div>
          {res.categoria && <div style={{marginTop:8}}><span style={{display:"inline-flex",alignItems:"center",gap:5,background:"#f1ede3",color:"#54514b",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:600}}><Icon name="clip" size={12}/>{res.categoria}</span></div>}
          <p style={{margin:"12px 0",fontSize:14,color:"#45423c",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{res.descricao}</p>
          <div style={{margin:"16px 0"}}><Stepper status={res.status}/></div>
          {res.prazo && <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,paddingTop:14,borderTop:"1px solid var(--line-2)"}}>
            <Icon name="calendar" size={15} color="var(--muted)"/>
            <span className="mono" style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:.5}}>PRAZO</span>
            <span style={{fontSize:13,fontWeight:600}}>{fmt(new Date(res.prazo+"T00:00:00").getTime())}</span>
            {prazoInfo && <span style={{fontSize:12,fontWeight:700,color:prazoInfo.color,background:(prazoInfo.color.startsWith("#")?prazoInfo.color+"15":"#f1ede3"),borderRadius:6,padding:"3px 8px"}}>{prazoInfo.txt}</span>}
          </div>}
          <div className="label" style={{margin:"16px 0 8px"}}>Andamento</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {(res.historico||[]).slice().reverse().map((h,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12.5,color:"var(--muted)"}}>
                <Icon name="clock" size={13}/><span className="mono" style={{color:"var(--faint)"}}>{fmtFull(h.at)}</span>
                <Icon name="chevron" size={12} color="#cbc5b6"/><StatusBadge status={h.status} small/></div>))}
          </div>
        </div>
      ); })()}
    </div>
  );
}

/* ---------------- Painel de gestão ---------------- */
function Gestao({requests,loading,reload}){
  const [unlocked,setUnlocked]=useState(false);
  const [code,setCode]=useState(""); const [err,setErr]=useState(false);
  const [filter,setFilter]=useState("todos"); const [query,setQuery]=useState("");

  useEffect(()=>{ if(!unlocked) return; const t=setInterval(()=>reload(),15000); return ()=>clearInterval(t); },[unlocked,reload]);

  const counts = useMemo(()=>{ const c={arquivadas:0}; STATUSES.forEach(s=>c[s.key]=0);
    requests.forEach(r=>{ if(r.arquivado){ c.arquivadas++; } else { c[r.status]=(c[r.status]||0)+1; } }); return c; },[requests]);
  const ativasTotal = useMemo(()=>requests.filter(r=>!r.arquivado).length,[requests]);
  const filtered = useMemo(()=>requests.filter(r=>{
    if(filter==="arquivadas"){ if(!r.arquivado) return false; }
    else { if(r.arquivado) return false; if(filter!=="todos" && r.status!==filter) return false; }
    if(query.trim()){ const q=query.toLowerCase(); return (r.nome+r.setor+r.descricao+r.protocolo).toLowerCase().includes(q); }
    return true; }),[requests,filter,query]);

  if(!unlocked) return (
    <div className="narrow" style={{maxWidth:400}}>
      <div className="card rise" style={{padding:32,textAlign:"center"}}>
        <div style={{width:50,height:50,borderRadius:12,background:"var(--ink)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><Icon name="lock" size={24} color="#fff"/></div>
        <h2 className="page-title" style={{fontSize:20,margin:"0 0 6px"}}>Acesso restrito</h2>
        <p className="page-sub" style={{margin:"0 auto 18px"}}>Digite o código para gerenciar as solicitações.</p>
        <input className="input mono" value={code} onChange={e=>{setCode(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&(code===CODIGO?setUnlocked(true):setErr(true))}
          placeholder="••••" style={{textAlign:"center",fontSize:20,letterSpacing:6,borderColor:err?"#dc2626":undefined}}/>
        {err && <div style={{color:"#dc2626",fontSize:12.5,marginTop:8}}>Código incorreto.</div>}
        <button className="btn btn-primary" onClick={()=>code===CODIGO?setUnlocked(true):setErr(true)} style={{width:"100%",marginTop:16}}>
          <Icon name="unlock" size={16}/> Entrar</button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="page-head" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:12,flexWrap:"wrap"}}>
        <div>
          <h2 className="page-title" style={{marginBottom:4}}>Painel de gestão</h2>
          <p className="page-sub" style={{margin:0}}>{requests.length} {requests.length===1?"solicitação registrada":"solicitações registradas"}.</p>
        </div>
        <button className="btn btn-ghost" onClick={reload} title="Atualizar"><Icon name="refresh" size={15} className={loading?"spin":""}/> Atualizar</button>
      </div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        <button className="chip" onClick={()=>setFilter("todos")} style={filter==="todos"?{background:"var(--ink)",color:"#fff",borderColor:"var(--ink)"}:undefined}>Todas <strong style={{marginLeft:5}}>{ativasTotal}</strong></button>
        {STATUSES.map(s=>(
          <button key={s.key} className="chip" onClick={()=>setFilter(filter===s.key?"todos":s.key)}
            style={filter===s.key?{background:s.color,color:"#fff",borderColor:s.color}:undefined}>
            {s.label} <strong style={{marginLeft:5}}>{counts[s.key]||0}</strong></button>))}
        <button className="chip" onClick={()=>setFilter(filter==="arquivadas"?"todos":"arquivadas")}
          style={filter==="arquivadas"?{background:"#44413c",color:"#fff",borderColor:"#44413c"}:undefined}>
          <Icon name="archive" size={13} style={{marginRight:5}}/> Arquivadas <strong style={{marginLeft:5}}>{counts.arquivadas||0}</strong></button>
      </div>

      <div style={{position:"relative",marginBottom:20}}>
        <Icon name="search" size={16} color="var(--faint)" style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)"}}/>
        <input className="input" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Buscar por nome, setor, protocolo ou descrição..." style={{paddingLeft:38}}/>
      </div>

      {loading && requests.length===0 ? <Empty text="Carregando solicitações..."/>
        : filtered.length===0 ? <Empty text={requests.length===0?"Nenhuma solicitação ainda. Elas aparecerão aqui assim que forem enviadas.":"Nenhuma solicitação com esse filtro."}/>
        : <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {filtered.map((r,i)=><RequestCard key={r.id} req={r} reload={reload} delay={i*0.04}/>)}
          </div>}
    </div>
  );
}

function Empty({text}){
  return <div style={{textAlign:"center",padding:"54px 20px",color:"var(--faint)"}}>
    <Icon name="alert" size={28} style={{marginBottom:10}}/><p style={{margin:0,fontSize:14}}>{text}</p></div>;
}

/* ---------------- Card de solicitação ---------------- */
function RequestCard({req,reload,delay}){
  const [open,setOpen]=useState(false);
  const [desc,setDesc]=useState(req.descricao);
  const [prazo,setPrazo]=useState(req.prazo||"");
  const [confirmDel,setConfirmDel]=useState(false);
  const s = sInfo(req.status);

  const save = async (patch)=>{ try{ await dbUpdate(req.id,{...patch,updatedAt:Date.now()}); reload(); }catch(e){ console.error(e); } };
  const changeStatus = async (ns)=>{ if(ns===req.status) return; const historico=[...(req.historico||[]),{status:ns,at:Date.now()}]; await save({status:ns,historico}); notifyStatus(req, ns); };
  const fmt=(ts)=>new Date(ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
  const fmtFull=(ts)=>new Date(ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});

  const prazoInfo = useMemo(()=>{
    if(!req.prazo) return null;
    const today=new Date(); today.setHours(0,0,0,0);
    const d=new Date(req.prazo+"T00:00:00"); const diff=Math.round((d-today)/86400000);
    if(req.status==="finalizado") return {txt:"Concluído",color:"#15803d"};
    if(diff<0) return {txt:`Atrasado ${Math.abs(diff)}d`,color:"#dc2626"};
    if(diff===0) return {txt:"Vence hoje",color:"#d9480f"};
    return {txt:`Faltam ${diff}d`,color:"#6f6b64"};
  },[req.prazo,req.status]);

  return (
    <div className="card lift rise" style={{borderLeft:`4px solid ${s.color}`,padding:18,animationDelay:`${delay}s`,opacity:req.arquivado?0.72:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:"1 1 240px",minWidth:0}}>
          <div className="mono" style={{fontSize:11,fontWeight:700,color:s.color,display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
            <Icon name="hash" size={12}/>{req.protocolo}<span style={{color:"var(--faint)",fontWeight:500}}>· {fmt(req.createdAt)}</span></div>
          <div style={{fontSize:17,fontWeight:700,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <Icon name="user" size={15} color="var(--muted)"/>{req.nome}
            <span style={{fontSize:13,fontWeight:500,color:"var(--muted)",display:"inline-flex",alignItems:"center",gap:4}}><Icon name="building" size={13}/>{req.setor}</span></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
          <StatusBadge status={req.status}/>
          <PriorityBadge prioridade={req.prioridade} small/>
        </div>
      </div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",margin:"10px 0 0",alignItems:"center"}}>
        {req.arquivado && <span style={{display:"inline-flex",alignItems:"center",gap:5,background:"#44413c",color:"#fff",borderRadius:6,padding:"3px 9px",fontSize:11.5,fontWeight:700}}><Icon name="archive" size={12}/> Arquivada</span>}
        {req.categoria && <span style={{display:"inline-flex",alignItems:"center",gap:5,background:"#f1ede3",color:"#54514b",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:600}}><Icon name="clip" size={12}/>{req.categoria}</span>}
        {req.contato && <span style={{display:"inline-flex",alignItems:"center",gap:5,color:"var(--muted)",fontSize:12.5}}><Icon name="user" size={12}/>{req.contato}</span>}
      </div>

      <p style={{margin:"12px 0",fontSize:14,color:"#45423c",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{req.descricao}</p>
      <div style={{margin:"14px 0"}}><Stepper status={req.status}/></div>

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
        {STATUSES.map(st=>{ const active=st.key===req.status; return (
          <button key={st.key} className="btn statusbtn" onClick={()=>changeStatus(st.key)}
            style={{background:active?st.color:st.color+"12",color:active?"#fff":st.color,
            border:`1px solid ${st.color}${active?"":"33"}`,borderRadius:8,padding:"6px 11px",fontSize:12,fontWeight:600}}>
            {st.label}</button>);})}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginTop:14,paddingTop:14,borderTop:"1px solid var(--line-2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <Icon name="calendar" size={15} color="var(--muted)"/>
          <span className="mono" style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:.5}}>PRAZO</span>
          <input type="date" className="input mono" value={prazo} onChange={e=>{setPrazo(e.target.value);save({prazo:e.target.value});}} style={{width:"auto",padding:"6px 9px",fontSize:13}}/>
          {prazoInfo && <span style={{fontSize:12,fontWeight:700,color:prazoInfo.color,background:prazoInfo.color+"15",borderRadius:6,padding:"3px 8px"}}>{prazoInfo.txt}</span>}
        </div>
        <div style={{flex:1}}/>
        {req.status==="finalizado" && !req.arquivado &&
          <button className="link" onClick={()=>save({arquivado:true})} style={{color:"var(--muted)",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><Icon name="archive" size={14}/> Arquivar</button>}
        {req.arquivado &&
          <button className="link" onClick={()=>save({arquivado:false})} style={{color:"var(--muted)",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><Icon name="archive" size={14}/> Desarquivar</button>}
        <button className="link" onClick={()=>setOpen(!open)} style={{color:"var(--muted)",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
          {open?"Ocultar":"Detalhes"} <Icon name="chevron" size={14} style={{transform:open?"rotate(90deg)":"none",transition:"transform .2s"}}/></button>
        <button className="iconbtn" onClick={()=>setConfirmDel(true)} style={{color:"#c2410c"}} title="Excluir"><Icon name="trash" size={16}/></button>
      </div>

      {open && <div className="pop" style={{marginTop:14}}>
        <div className="label">Editar descrição</div>
        <textarea className="textarea" rows={3} value={desc} onChange={e=>setDesc(e.target.value)} style={{resize:"vertical"}}/>
        <button className="btn btn-dark" onClick={()=>save({descricao:desc})} disabled={desc===req.descricao} style={{marginTop:8}}>Salvar descrição</button>
        <div className="label" style={{margin:"16px 0 8px"}}>Histórico</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {(req.historico||[]).slice().reverse().map((h,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12.5,color:"var(--muted)"}}>
              <Icon name="clock" size={13}/><span className="mono" style={{color:"var(--faint)"}}>{fmtFull(h.at)}</span>
              <Icon name="chevron" size={12} color="#cbc5b6"/><StatusBadge status={h.status} small/></div>))}
        </div>
      </div>}

      {confirmDel && <div className="pop" style={{marginTop:12,background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:13,color:"#991b1b",fontWeight:500}}>Excluir esta solicitação permanentemente?</span>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-ghost" onClick={()=>setConfirmDel(false)}>Cancelar</button>
          <button className="btn btn-danger" onClick={async()=>{await dbDelete(req.id);reload();}}><Icon name="x" size={14}/> Excluir</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
